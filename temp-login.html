<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Alumco LMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "tertiary-fixed-dim": "#dacff0",
                "surface-dim": "#cfdce3",
                "on-tertiary-container": "#554e69",
                "tertiary": "#625b77",
                "on-primary-fixed": "#1d3989",
                "error-container": "#ff8b9a",
                "secondary": "#5f5f5f",
                "on-tertiary-fixed": "#423b56",
                "surface-bright": "#f7f9fb",
                "on-secondary": "#fbf8fc",
                "secondary-fixed": "#e4e1e6",
                "on-tertiary": "#fdf7ff",
                "secondary-dim": "#535356",
                "surface": "#f7f9fb",
                "error": "#9e3f4e",
                "on-primary-fixed-variant": "#3d57a7",
                "on-secondary-fixed": "#3f3f43",
                "primary-fixed": "#dce1ff",
                "tertiary-dim": "#564f6a",
                "on-primary": "#f8f7ff",
                "on-secondary-fixed-variant": "#5b5b5f",
                "surface-container-high": "#e1e9ee",
                "inverse-on-surface": "#9a9d9f",
                "surface-tint": "#4059aa",
                "on-secondary-container": "#525155",
                "surface-container-lowest": "#ffffff",
                "on-surface-variant": "#566166",
                "outline": "#717c82",
                "primary-dim": "#334d9d",
                "primary-container": "#dce1ff",
                "on-background": "#2a3439",
                "secondary-container": "#e4e1e6",
                "on-error-container": "#782232",
                "background": "#f7f9fb",
                "tertiary-fixed": "#e8ddff",
                "on-surface": "#2a3439",
                "primary-fixed-dim": "#c9d3ff",
                "surface-container-low": "#f0f4f7",
                "primary": "#4059aa",
                "inverse-surface": "#0b0f10",
                "outline-variant": "#a9b4b9",
                "on-tertiary-fixed-variant": "#5f5773",
                "inverse-primary": "#8fa7fe",
                "surface-container-highest": "#d9e4ea",
                "error-dim": "#4f0116",
                "surface-container": "#e8eff3",
                "tertiary-container": "#e8ddff",
                "secondary-fixed-dim": "#d6d3d8",
                "on-error": "#fff7f7",
                "surface-variant": "#d9e4ea",
                "on-primary-container": "#334c9d"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
        }
        .architectural-shadow {
            box-shadow: 0 20px 40px rgba(42, 52, 57, 0.06);
        }
        .ghost-border {
            border: 1px solid rgba(169, 180, 185, 0.15);
        }
      </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 bg-surface">
<!-- TopNavBar Suppression Logic: Current page is a Transactional/Login screen, Shell is hidden as per mandate. -->
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-12 flex flex-col items-center gap-4">
<div class="relative w-16 h-16 flex items-center justify-center">
<!-- Geometric Diamond Icon -->
<svg class="w-full h-full" viewbox="0 0 100 100">
<path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none"></path>
<path d="M50 5 L95 50 L50 50 Z" fill="#9e3f4e"></path> <!-- Red section -->
<path d="M95 50 L50 95 L50 50 Z" fill="#4059aa"></path> <!-- Blue section -->
<path d="M50 95 L5 50 L50 50 Z" fill="#eab308"></path> <!-- Yellow section -->
<path d="M5 50 L50 5 L50 50 Z" fill="#166534"></path> <!-- Green section -->
</svg>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-[#2B4FA0]">alumco</h1>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest architectural-shadow rounded-xl p-8 md:p-10 ghost-border">
<div class="text-center mb-10">
<h2 class="text-[1.5rem] font-bold text-[#2B4FA0] leading-tight mb-2">Bienvenido/a</h2>
<p class="text-secondary text-body-md font-medium">Ingresa a la plataforma de capacitación</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-label-md font-medium text-on-surface-variant" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 transition-all outline-none ghost-border" id="email" placeholder="nombre@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-label-md font-medium text-on-surface-variant" for="password">Contraseña</label>
<a class="text-label-md text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<input class="w-full h-[52px] px-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 transition-all outline-none ghost-border" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[52px] bg-[#2B4FA0] text-on-primary font-semibold rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
<span>Ingresar</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Card Footer -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-label-md text-secondary leading-relaxed">
                    ¿Problemas para ingresar? <br class="md:hidden"/>
<a class="text-primary font-semibold hover:underline" href="#">Contacta a tu administrador.</a>
</p>
</div>
</div>
<!-- External Links -->
<div class="mt-8 flex gap-6 text-label-md text-outline">
<a class="hover:text-primary transition-colors" href="#">Términos de servicio</a>
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
</div>
</main>
<!-- Visual Background Element (Subtle Gradient) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Footer Component is suppressed as per "The Destination Rule" - Login is a transactional focus screen. -->
</body></html>
